name: Update Citation Count

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger from Actions tab

jobs:
  fetch-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch citation counts
        id: fetch
        run: |
          DOI="10.3389/fsoc.2024.1379265"

          # --- Semantic Scholar ---
          SS_RESPONSE=$(curl -s --max-time 20 \
            "https://api.semanticscholar.org/graph/v1/paper/DOI:${DOI}?fields=citationCount")
          echo "Semantic Scholar response: $SS_RESPONSE"
          SS_COUNT=$(echo "$SS_RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("citationCount",0))')
          echo "Semantic Scholar count: $SS_COUNT"

          # --- Crossref ---
          CR_RESPONSE=$(curl -s --max-time 20 \
            "https://api.crossref.org/works/${DOI}?mailto=anwar1524@gmail.com")
          echo "Crossref response (truncated): $(echo $CR_RESPONSE | head -c 300)"
          CR_COUNT=$(echo "$CR_RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("message",{}).get("is-referenced-by-count",0))')
          echo "Crossref count: $CR_COUNT"

          echo "ss_count=$SS_COUNT" >> $GITHUB_OUTPUT
          echo "cr_count=$CR_COUNT" >> $GITHUB_OUTPUT

      - name: Write citations.json
        run: |
          SS="${{ steps.fetch.outputs.ss_count }}"
          CR="${{ steps.fetch.outputs.cr_count }}"
          DATE=$(date -u +"%Y-%m-%d")
          printf '{\n  "frontiers2024": {\n    "doi": "10.3389/fsoc.2024.1379265",\n    "title": "Facebook Reactions as Emotional Indicators",\n    "semanticScholar": %s,\n    "crossref": %s,\n    "lastUpdated": "%s"\n  }\n}\n' "$SS" "$CR" "$DATE" > citations.json
          cat citations.json

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add citations.json
          if git diff --cached --quiet; then
            echo "No change in citation counts - skipping commit."
          else
            git commit -m "chore: update citation counts [skip ci]"
            git push
          fi
